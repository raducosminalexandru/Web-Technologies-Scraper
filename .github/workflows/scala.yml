name: Scala CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Spark/sbt can be memory-heavy, this keeps the runner stable
    env:
      SBT_OPTS: "-Xmx2G -XX:+UseG1GC"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'

      - name: Check Formatting
        run: sbt scalafmtCheckAll

      - name: Compile
        run: sbt compile

      - name: Build Fat JAR (Assembly)
        run: sbt assembly

      - name: Upload dependency graph
        uses: scalacenter/sbt-dependency-submission@v2
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/raducosminalexandru/web-technologies-scraper:latest
            ghcr.io/raducosminalexandru/web-technologies-scraper:${{ github.sha }}
